services:

  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft
    environment:
      EULA: "TRUE"
      MEMORY: ${MC_MEMORY:-2G}
      TYPE: ${MC_TYPE:-VANILLA}
      VERSION: ${MC_VERSION:-LATEST}
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    volumes:
      - ${DATA_ROOT:-./data}/minecraft:/data
    labels:
      - "homelab.admin.managed=true"
      - "homelab.admin.name=Minecraft"
      - "homelab.admin.exposure=playit"
      - "homelab.admin.description=Java Minecraft server published through Playit"
    ports:
      - "25565:25565"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles:
      - local-ollama
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
    labels:
      - "homelab.admin.managed=true"
      - "homelab.admin.name=Ollama"
      - "homelab.admin.exposure=local-only"
      - "homelab.admin.description=Local model runtime used by Open WebUI"
    volumes:
      - ${DATA_ROOT:-./data}/ollama:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      WEBUI_URL: ${OPENWEBUI_PUBLIC_URL:-}
      CORS_ALLOW_ORIGIN: ${OPENWEBUI_CORS_ALLOW_ORIGIN:-}
      ENABLE_SIGNUP: "TRUE"
      ENABLE_SIGNUP_PASSWORD_CONFIRMATION: "TRUE"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openwebui.rule=Host(`${OPENWEBUI_PUBLIC_HOST}`)"
      - "traefik.http.routers.openwebui.entrypoints=web"
      - "traefik.http.services.openwebui.loadbalancer.server.port=8080"
      - "homelab.admin.managed=true"
      - "homelab.admin.name=Open WebUI"
      - "homelab.admin.exposure=traefik"
      - "homelab.admin.description=Chat interface exposed through Traefik"
    volumes:
      - ${DATA_ROOT:-./data}/openwebui:/app/backend/data
    ports:
      - "127.0.0.1:3001:8080"
    restart: unless-stopped

  admin-control:
    build:
      context: .
      dockerfile: services/admin-control/Dockerfile
    container_name: admin-control
    environment:
      ADMIN_STATE_DIR: /data/admin-control
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      ADMIN_SECURE_COOKIES: ${ADMIN_SECURE_COOKIES:-1}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin-control.rule=Host(`${ADMIN_PUBLIC_HOST}`)"
      - "traefik.http.routers.admin-control.entrypoints=web"
      - "traefik.http.services.admin-control.loadbalancer.server.port=8000"
      - "homelab.admin.managed=true"
      - "homelab.admin.protected=true"
      - "homelab.admin.name=Admin Control"
      - "homelab.admin.exposure=traefik"
      - "homelab.admin.description=Protected dashboard for controlling and registering services"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA_ROOT:-./data}/admin-control:/data/admin-control
    ports:
      - "127.0.0.1:8091:8000"
    restart: unless-stopped

  traefik:
    image: traefik:v3.1
    container_name: traefik
    profiles:
      - public-http
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --api.insecure=true
    ports:
      - "127.0.0.1:${TRAEFIK_HOST_PORT:-8089}:80"
      - "127.0.0.1:${TRAEFIK_DASHBOARD_PORT:-8088}:8080"
    labels:
      - "homelab.admin.managed=true"
      - "homelab.admin.protected=true"
      - "homelab.admin.name=Traefik"
      - "homelab.admin.exposure=local-router"
      - "homelab.admin.description=HTTP router for public subdomains"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  nextcloud:
    image: ghcr.io/nextcloud-releases/all-in-one:latest
    init: true
    container_name: nextcloud-aio-mastercontainer
    environment:
      APACHE_PORT: 80
      APACHE_IP_BINDING: 0.0.0.0
      SKIP_DOMAIN_VALIDATION: "true"
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_PUBLIC_HOST}
      NEXTCLOUD_OVERWRITEHOST: ${NEXTCLOUD_PUBLIC_HOST}
      NEXTCLOUD_OVERWRITEPROTOCOL: https
      NEXTCLOUD_TRUSTED_PROXIES: 127.0.0.1/32,172.16.0.0/12
      NEXTCLOUD_AIO_APACHE_ADDITIONAL_LABELS: |
        traefik.enable=true
        traefik.http.routers.nextcloud.rule=Host(`${NEXTCLOUD_PUBLIC_HOST}`)
        traefik.http.routers.nextcloud.entrypoints=web
        traefik.http.services.nextcloud.loadbalancer.server.port=443
        traefik.http.services.nextcloud.loadbalancer.server.scheme=https
        homelab.admin.managed=true
        homelab.admin.name=Nextcloud
        homelab.admin.exposure=traefik
        homelab.admin.description=Nextcloud app exposed through Traefik
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
    labels:
      - "homelab.admin.managed=true"
      - "homelab.admin.name=Nextcloud AIO Master"
      - "homelab.admin.exposure=local-only"
      - "homelab.admin.description=Nextcloud All-in-One master container with bundled PostgreSQL"
    volumes:
      - nextcloud_aio_mastercontainer:/mnt/docker-aio-config
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8081:8080"
    restart: unless-stopped

  playit:
    image: ghcr.io/playit-cloud/playit-agent:latest
    container_name: playit
    profiles:
      - public-game
    network_mode: host
    environment:
      SECRET_KEY: ${PLAYIT_SECRET_KEY}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    labels:
      - "homelab.admin.managed=true"
      - "homelab.admin.name=Playit"
      - "homelab.admin.exposure=playit"
      - "homelab.admin.description=Public tunnel agent for Minecraft and other games"
    volumes:
      - ${DATA_ROOT:-./data}/playit:/data
    restart: unless-stopped

volumes:
  nextcloud_aio_mastercontainer:
    name: nextcloud_aio_mastercontainer
