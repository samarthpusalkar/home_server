services:

  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft
    environment:
      EULA: "TRUE"
      MEMORY: ${MC_MEMORY:-2G}
      TYPE: ${MC_TYPE:-VANILLA}
      VERSION: ${MC_VERSION:-LATEST}
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    volumes:
      - ${DATA_ROOT:-./data}/minecraft:/data
    ports:
      - "25565:25565"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
    volumes:
      - ${DATA_ROOT:-./data}/ollama:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    depends_on:
      - ollama
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      WEBUI_URL: ${PUBLIC_BASE_URL:-https://home.example.com}${OPENWEBUI_PUBLIC_PATH:-/openwebui}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openwebui.rule=Host(`${PUBLIC_APP_HOST:-home.example.com}`) && PathPrefix(`${OPENWEBUI_PUBLIC_PATH:-/openwebui}`)"
      - "traefik.http.routers.openwebui.entrypoints=web"
      - "traefik.http.routers.openwebui.middlewares=openwebui-strip"
      - "traefik.http.middlewares.openwebui-strip.stripprefix.prefixes=${OPENWEBUI_PUBLIC_PATH:-/openwebui}"
      - "traefik.http.services.openwebui.loadbalancer.server.port=8080"
    volumes:
      - ${DATA_ROOT:-./data}/openwebui:/app/backend/data
    ports:
      - "3000:8080"
    restart: unless-stopped

  traefik:
    image: traefik:v3.1
    container_name: traefik
    profiles:
      - public-http
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --api.insecure=true
    ports:
      - "80:80"
      - "127.0.0.1:8088:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    environment:
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}
      PUBLIC_APP_HOST: ${PUBLIC_APP_HOST:-home.example.com}
      PUBLIC_APP_SCHEME: ${PUBLIC_APP_SCHEME:-https}
      NEXTCLOUD_PUBLIC_PATH: ${NEXTCLOUD_PUBLIC_PATH:-/nextcloud}
      NEXTCLOUD_TRUSTED_PROXIES: ${NEXTCLOUD_TRUSTED_PROXIES:-127.0.0.1 172.16.0.0/12}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextcloud.rule=Host(`${PUBLIC_APP_HOST:-home.example.com}`) && PathPrefix(`${NEXTCLOUD_PUBLIC_PATH:-/nextcloud}`)"
      - "traefik.http.routers.nextcloud.entrypoints=web"
      - "traefik.http.routers.nextcloud.middlewares=nextcloud-strip"
      - "traefik.http.middlewares.nextcloud-strip.stripprefix.prefixes=${NEXTCLOUD_PUBLIC_PATH:-/nextcloud}"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"
    volumes:
      - ${DATA_ROOT:-./data}/nextcloud:/var/www/html
      - ./config/nextcloud/reverse-proxy.config.php:/var/www/html/config/reverse-proxy.config.php:ro
    ports:
      - "8081:80"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    profiles:
      - managed-cloudflare
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TOKEN}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  playit:
    image: ghcr.io/playit-cloud/playit-agent:latest
    container_name: playit
    profiles:
      - public-game
    network_mode: host
    environment:
      SECRET_KEY: ${PLAYIT_SECRET_KEY}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    volumes:
      - ${DATA_ROOT:-./data}/playit:/data
    restart: unless-stopped
