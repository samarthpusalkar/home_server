services:

  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft
    environment:
      EULA: "TRUE"
      MEMORY: ${MC_MEMORY:-2G}
      TYPE: ${MC_TYPE:-VANILLA}
      VERSION: ${MC_VERSION:-LATEST}
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    volumes:
      - ${DATA_ROOT:-./data}/minecraft:/data
    labels:
      - "homelab.admin.managed=true"
      - "homelab.admin.name=Minecraft"
      - "homelab.admin.exposure=playit"
      - "homelab.admin.description=Java Minecraft server published through Playit"
    ports:
      - "25565:25565"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles:
      - local-ollama
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
    labels:
      - "homelab.admin.managed=true"
      - "homelab.admin.name=Ollama"
      - "homelab.admin.exposure=local-only"
      - "homelab.admin.description=Local model runtime used by Open WebUI"
    volumes:
      - ${DATA_ROOT:-./data}/ollama:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      WEBUI_URL: ${OPENWEBUI_PUBLIC_URL:-}
      CORS_ALLOW_ORIGIN: ${OPENWEBUI_CORS_ALLOW_ORIGIN:-}
      ENABLE_SIGNUP: "True"
      ENABLE_SIGNUP_PASSWORD_CONFIRMATION: "True"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openwebui.rule=Host(`${OPENWEBUI_PUBLIC_HOST}`)"
      - "traefik.http.routers.openwebui.entrypoints=web"
      - "traefik.http.services.openwebui.loadbalancer.server.port=8080"
      - "homelab.admin.managed=true"
      - "homelab.admin.name=Open WebUI"
      - "homelab.admin.exposure=traefik"
      - "homelab.admin.description=Chat interface exposed through Traefik"
    volumes:
      - ${DATA_ROOT:-./data}/openwebui:/app/backend/data
    ports:
      - "127.0.0.1:3001:8080"
    restart: unless-stopped

  admin-control:
    build:
      context: .
      dockerfile: services/admin-control/Dockerfile
    container_name: admin-control
    environment:
      ADMIN_STATE_DIR: /data/admin-control
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      ADMIN_SECURE_COOKIES: ${ADMIN_SECURE_COOKIES:-1}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin-control.rule=Host(`${ADMIN_PUBLIC_HOST}`)"
      - "traefik.http.routers.admin-control.entrypoints=web"
      - "traefik.http.services.admin-control.loadbalancer.server.port=8000"
      - "homelab.admin.managed=true"
      - "homelab.admin.protected=true"
      - "homelab.admin.name=Admin Control"
      - "homelab.admin.exposure=traefik"
      - "homelab.admin.description=Protected dashboard for controlling and registering services"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA_ROOT:-./data}/admin-control:/data/admin-control
    ports:
      - "127.0.0.1:8091:8000"
    restart: unless-stopped

  traefik:
    image: traefik:v3.1
    container_name: traefik
    profiles:
      - public-http
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --api.insecure=true
    ports:
      - "127.0.0.1:${TRAEFIK_HOST_PORT:-8089}:80"
      - "127.0.0.1:${TRAEFIK_DASHBOARD_PORT:-8088}:8080"
    labels:
      - "homelab.admin.managed=true"
      - "homelab.admin.protected=true"
      - "homelab.admin.name=Traefik"
      - "homelab.admin.exposure=local-router"
      - "homelab.admin.description=HTTP router for public subdomains"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    environment:
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}
      PUBLIC_APP_SCHEME: ${PUBLIC_APP_SCHEME:-https}
      NEXTCLOUD_PUBLIC_HOST: ${NEXTCLOUD_PUBLIC_HOST:-}
      NEXTCLOUD_PUBLIC_URL: ${NEXTCLOUD_PUBLIC_URL:-}
      NEXTCLOUD_PUBLIC_PATH: ${NEXTCLOUD_PUBLIC_PATH:-}
      NEXTCLOUD_TRUSTED_PROXIES: ${NEXTCLOUD_TRUSTED_PROXIES:-127.0.0.1 172.16.0.0/12}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextcloud.rule=Host(`${NEXTCLOUD_PUBLIC_HOST}`)"
      - "traefik.http.routers.nextcloud.entrypoints=web"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"
      - "homelab.admin.managed=true"
      - "homelab.admin.name=Nextcloud"
      - "homelab.admin.exposure=traefik"
      - "homelab.admin.description=File sync and collaboration app exposed through Traefik"
    volumes:
      - ${DATA_ROOT:-./data}/nextcloud:/var/www/html
      # - ./config/nextcloud/reverse-proxy.config.php:/var/www/html/config/reverse-proxy.config.php:ro
    # ports:
    #   - "127.0.0.1:8081:80"
    restart: unless-stopped

  playit:
    image: ghcr.io/playit-cloud/playit-agent:latest
    container_name: playit
    profiles:
      - public-game
    network_mode: host
    environment:
      SECRET_KEY: ${PLAYIT_SECRET_KEY}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    labels:
      - "homelab.admin.managed=true"
      - "homelab.admin.name=Playit"
      - "homelab.admin.exposure=playit"
      - "homelab.admin.description=Public tunnel agent for Minecraft and other games"
    volumes:
      - ${DATA_ROOT:-./data}/playit:/data
    restart: unless-stopped
