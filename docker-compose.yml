version: "3.9"

services:

  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft
    environment:
      EULA: "TRUE"
      MEMORY: ${MC_MEMORY:-2G}
      TYPE: ${MC_TYPE:-VANILLA}
      VERSION: ${MC_VERSION:-LATEST}
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    volumes:
      - ${DATA_ROOT:-./data}/minecraft:/data
    ports:
      - "25565:25565"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
    volumes:
      - ${DATA_ROOT:-./data}/ollama:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    depends_on:
      - ollama
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    volumes:
      - ${DATA_ROOT:-./data}/openwebui:/app/backend/data
    ports:
      - "3000:8080"
    restart: unless-stopped

  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    environment:
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    volumes:
      - ${DATA_ROOT:-./data}/nextcloud:/var/www/html
    ports:
      - "8081:80"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TOKEN}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  playit:
    image: playitapp/playit:latest
    container_name: playit
    network_mode: host
    environment:
      SECRET_KEY: ${PLAYIT_SECRET_KEY}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    volumes:
      - ${DATA_ROOT:-./data}/playit:/data
    restart: unless-stopped
